<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Jesse Swaney Home</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main>
		<h1>Welcome Home</h1>
		<p align=center><img src="home.jpg" alt="home" width="25%"></p>
      </main>

    <script>
      document.getElementById('pwForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const v = document.getElementById('pw').value.trim();
        if (!v) return;
        const target = encodeURIComponent(v) + '.html';
        window.location.href = target;
      });
    </script>
  </body>
</html>
